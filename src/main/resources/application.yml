spring:
  application:
    name: user-service

  # Datasource URL is auto-injected by spring-boot-docker-compose in dev,
  # and by @ServiceConnection (Testcontainers) in tests.
  # In prod, supply via env vars: SPRING_DATASOURCE_URL, _USERNAME, _PASSWORD.
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8070

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.beamcard.user: DEBUG
    org.flywaydb: INFO
