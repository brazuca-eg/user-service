# Auto-started by spring-boot-docker-compose when you run `mvn spring-boot:run`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: beamcard-user-db
    environment:
      POSTGRES_DB: beamcard_user
      POSTGRES_USER: beamcard
      POSTGRES_PASSWORD: beamcard
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beamcard -d beamcard_user"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
