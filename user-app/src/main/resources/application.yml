spring:
  application:
    name: user-service

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: 8070

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

beamcard:
  auth:
    access-token-ttl: PT15M

  cors:
    allowed-origins: http://localhost:5173

logging:
  level:
    com.beamcard.user: DEBUG
    org.flywaydb: INFO
