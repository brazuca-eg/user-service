server:
  port: ${PORT:8070} # Railway injects $PORT

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}

beamcard:
  auth:
    jwt:
      private-key-pem: ${JWT_PRIVATE_KEY_PEM}
      public-key-pem: ${JWT_PUBLIC_KEY_PEM}
      generate-if-missing: false
    password-reset:
      reset-url-template: ${PASSWORD_RESET_URL}
  email:
    provider: ${EMAIL_PROVIDER:resend}
    from: ${EMAIL_FROM}
    resend:
      api-key: ${RESEND_API_KEY}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

eureka:
  client:
    enabled: false
